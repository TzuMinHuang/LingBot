upstream backend {
    server backend-service:9200;
    # 擴展時新增實例：
    # server backend-service:9200;  ← Docker DNS 自動 round-robin 多實例
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # 前端靜態檔案
    location /chatbot {
        try_files $uri $uri/ /index.html;
    }

    # ── 跨域白名單 ──
    # 允許指定網域載入 widget script
    location /widgets/ {
        # 動態匹配 Origin，只允許白名單網域
        set $cors_origin "";
        if ($http_origin ~* "^https?://(localhost(:\d+)?|127\.0\.0\.1(:\d+)?|([a-z0-9-]+\.)?example\.com)$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Vary Origin always;
    }

    # 允許指定網域嵌入 chatbot iframe
    location /pages/ {
        add_header X-Frame-Options "" always;
        add_header Content-Security-Policy "frame-ancestors 'self' https://*.example.com" always;
    }

    # REST API + SSE
    location /bot/ {
        proxy_pass http://backend/bot/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';    # SSE: 禁止 keep-alive 壓縮
        proxy_buffering off;              # SSE: 關閉緩衝，即時推送
        proxy_cache off;                  # SSE: 關閉快取
        proxy_read_timeout 300s;          # SSE: 長連線超時 5 分鐘
    }

    # chat API + SSE（context path 是 /bot）
    location /chat/ {
        proxy_pass http://backend/bot/chat/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

# 直連後端（開發用，繞過 Nginx routing）
server {
    listen 9200;
    server_name localhost;

    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
