model_list:
  # Ollama 本地模型
  - model_name: llama3.1
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://ollama:11434
  - model_name: mxbai-embed-large
    litellm_params:
      model: ollama/mxbai-embed-large
      api_base: http://ollama:11434

  # 外部 API（需在 .env 設定對應的 API Key 才會生效）
  # - model_name: gpt-4o
  #   litellm_params:
  #     model: openai/gpt-4o
  #     api_key: "os.ENV/OPENAI_API_KEY"
  # - model_name: claude-3-5-sonnet
  #   litellm_params:
  #     model: anthropic/claude-3-5-sonnet-20241022
  #     api_key: "os.ENV/ANTHROPIC_API_KEY"

litellm_settings:
  drop_params: true
  set_verbose: false

  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
    db: 1
    max_connections: 100
    supported_call_types: ["completion", "embedding"]

router_settings:
  routing_strategy: least-busy