server:
  port: 9100
  servlet:
    context-path: /admin
spring:
  profiles:
    active: dev
  application:
    name: admin
---
spring:
  config:
    activate:
      on-profile: dev
  # PostgreSQL 設定
  datasource:
    primary:
      url: jdbc:postgresql://localhost:5432/chatdb
      username: chatuser
      password: chatpass
      driverClassName: org.postgresql.Driver
      hikari:
        initialization-fail-timeout: 60000 # 等待最長 60 秒
        connection-timeout: 10000
        pool-name: primary_pool
        maximum-pool-size: 20
        minimum-idle: 10
        idle-timeout: 30000
        max-lifetime: 600000
        validation-timeout: 5000
        connection-test-query: SELECT 1
    secondary:
      url: jdbc:h2:mem:chatdb
      username: sa
      password: 
      driverClassName: org.h2.Driver
      hikari:
        initialization-fail-timeout: 60000 # 等待最長 60 秒
        connection-timeout: 10000
        pool-name: primary_pool
        maximum-pool-size: 20
        minimum-idle: 10
        idle-timeout: 30000
        max-lifetime: 600000
        validation-timeout: 5000
        connection-test-query: SELECT 1
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  # MongoDB 設定
  data:
    mongodb:
      uri: mongodb://localhost:27017/chatlogdb
    # Redis 設定
    redis:
      host: localhost
      port: 6379
      client-name: default
      client-type: lettuce
      lettuce: 
        dns:
          resolver: JVM
  # RabbitMQ 設定
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
javamelody:
  enabled: true
  excluded-datasources: secretSource,topSecretSource
  spring-monitoring-enabled: true
  init-parameters:
    log: true
---
spring:
  config:
    activate:
      on-profile: test
  # PostgreSQL 設定
  datasource:
    url: jdbc:postgresql://${DATASOURCE_URL}:${DATASOURCE_PORT}/chatdb
    username: chatuser
    password: chatpass
    hikari:
      initialization-fail-timeout: 60000 # 等待最長 60 秒
      connection-timeout: 10000
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  # MongoDB 設定
  data:
    mongodb:
      uri: mongodb://${MONGODB_URI}:${MONGODB_PORT}/chatlogdb
  # Redis 設定
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      client-name: default
      client-type: lettuce
  # RabbitMQ 設定
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: guest
    password: guest
