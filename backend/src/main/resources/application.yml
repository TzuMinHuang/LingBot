server:
  port: 9200
  servlet:
    context-path: /bot
spring:
  profiles:
    active: dev
  application:
    name: bot

# App settings (shared across profiles)
app:
  stream-timeout-minutes: 3
  sse-timeout-minutes: 5
  max-input-length: 500
  consumer-count: 8
  sse-pool-size: 50
  throttle-buffer-capacity: 512
  cors-allowed-origins: http://localhost,http://localhost:5500,http://192.168.0.130:8080,http://192.168.0.130,http://192.168.0.130:5500
---
spring:
  config:
    activate:
      on-profile: dev
  # PostgreSQL 設定
  datasource:
    url: jdbc:postgresql://192.168.0.130:5432/chatdb
    username: ${DB_USERNAME:chatuser}
    password: ${DB_PASSWORD:chatpass}
    driverClassName: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 60000 # 等待最長 60 秒
      connection-timeout: 10000
      pool-name: primary_pool
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 600000
      validation-timeout: 5000
      connection-test-query: SELECT 1

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  # Redis 設定（database 0 專屬 backend）
  data:
    redis:
      host: 192.168.0.130
      port: 16379
      database: 0
      client-name: default
      client-type: lettuce
      lettuce:
        dns:
          resolver: JVM
logging:
  level:
    idv.hzm.app.bot: DEBUG
    io.lettuce.core: WARN
    org.springframework.data.redis: WARN

javamelody:
  enabled: true
  excluded-datasources: secretSource,topSecretSource
  spring-monitoring-enabled: true
  init-parameters:
    log: true

anythingllm:
  base-url: http://192.168.0.130:3001
  api-key: ${ANYTHINGLLM_API_KEY}
  workspace-slug: ${ANYTHINGLLM_WORKSPACE_SLUG}
---
spring:
  config:
    activate:
      on-profile: test
  # PostgreSQL 設定
  datasource:
    url: jdbc:postgresql://${DATASOURCE_URL}:${DATASOURCE_PORT}/chatdb
    username: ${DB_USERNAME:chatuser}
    password: ${DB_PASSWORD:chatpass}
    hikari:
      initialization-fail-timeout: 60000 # 等待最長 60 秒
      connection-timeout: 10000
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  # Redis 設定（database 0 專屬 backend）
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: ${REDIS_DATABASE:0}
      client-name: default
      client-type: lettuce

logging:
  level:
    idv.hzm.app.bot: DEBUG
    io.lettuce.core: WARN
    org.springframework.data.redis: WARN

javamelody:
  enabled: true
  excluded-datasources: secretSource,topSecretSource
  spring-monitoring-enabled: true
  init-parameters:
    log: true

anythingllm:
  base-url: ${ANYTHINGLLM_BASE_URL}
  api-key: ${ANYTHINGLLM_API_KEY}
  workspace-slug: ${ANYTHINGLLM_WORKSPACE_SLUG}