# 啟動基礎設施：docker compose --profile infra up -d
# 啟動應用層：  docker compose --profile infra --profile app up -d --build
# 擴展後端：    docker compose --profile infra --profile app up -d --build --scale backend-service=3
services:

  # ── 基礎設施（profile: infra）────────────────────────
  redis:
    profiles: [ "infra" ]
    image: redis:7
    container_name: redis
    ports:
      - "16379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 將原先的 db 與 postgres 整併為單一實體
  postgres:
    profiles: [ "infra" ]
    image: pgvector/pgvector:pg15
    container_name: postgres
    environment:
      # 設定最高權限的管理者帳密，供建立子資料庫使用
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 透過 seed 腳本在啟動時自動建立 litellm, anythingllm, chatdb 三個資料庫
      - ./postgres-seed:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 每次啟動都會執行，確保 DB/帳號/權限存在（冪等）
  postgres-init:
    profiles: [ "infra" ]
    image: pgvector/pgvector:pg15
    container_name: postgres-init
    volumes:
      - ./postgres-seed/ensure-db.sh:/ensure-db.sh:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      ANYTHINGLLM_DB_USER: ${ANYTHINGLLM_DB_USER}
      ANYTHINGLLM_DB_PASSWORD: ${ANYTHINGLLM_DB_PASSWORD}
      LITELLM_DB_USER: ${LITELLM_DB_USER}
      LITELLM_DB_PASSWORD: ${LITELLM_DB_PASSWORD}
    entrypoint: [ "bash", "/ensure-db.sh" ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  pgadmin:
    profiles: [ "infra" ]
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    profiles: [ "infra" ]
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 每次啟動都會檢查模型清單，已有的跳過，缺少的自動下載
  ollama-init:
    profiles: [ "infra" ]
    image: ollama/ollama
    container_name: ollama-init
    volumes:
      - ./data/ollama:/root/.ollama
      - ./ollama/ensure-models.sh:/ensure-models.sh:ro
      - ./ollama/models.txt:/models.txt:ro
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: [ "bash", "/ensure-models.sh" ]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  litellm:
    profiles: [ "infra" ]
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm_proxy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/litellm_config.yaml:/app/config.yaml
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      # 指向共用的 Postgres，使用專屬帳號連線 litellm_db
      - DATABASE_URL=postgresql://${LITELLM_DB_USER}:${LITELLM_DB_PASSWORD}@postgres:5432/litellm_db
      - REDIS_URL=redis://redis:6379/1
      - SUPERVISORD_STOPWAITSECS=3600
      - LITELLM_WORKERS=8
      - DISABLE_SWAGGER_UI=false
    command: [ "--config", "/app/config.yaml" ]
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  anythingllm:
    profiles: [ "infra" ]
    # 使用官方專屬的 PostgreSQL 映像檔
    image: mintplexlabs/anythingllm:pg
    container_name: anythingllm
    ports:
      - "3001:3001"
    volumes:
      # 雖然資料存進 DB 了，但上傳的原始文件(.pdf, .txt等) 還是需要 Volume 儲存
      - ./data/anythingllm:/app/server/storage
    environment:
      - STORAGE_DIR=/app/server/storage
      - JWT_SECRET=${ANYTHINGLLM_JWT_SECRET}
      # 指向共用的 Postgres，使用專屬帳號連線 anythingllm_db
      - DATABASE_URL=postgresql://${ANYTHINGLLM_DB_USER}:${ANYTHINGLLM_DB_PASSWORD}@postgres:5432/anythingllm_db
      # LLM 提供者：透過 LiteLLM 代理（Generic OpenAI）
      - LLM_PROVIDER=generic-openai
      - GENERIC_OPEN_AI_BASE_URL=http://litellm_proxy:4000/v1
      - GENERIC_OPEN_AI_MODEL_PREF=llama3.1
      - GENERIC_OPEN_AI_API_KEY=${LITELLM_MASTER_KEY}
      # Embedding 提供者：透過 LiteLLM 代理
      - EMBEDDING_ENGINE=generic-openai
      - GENERIC_OPEN_AI_EMBEDDING_URL=http://litellm_proxy:4000/v1
      - GENERIC_OPEN_AI_EMBEDDING_MODEL_PREF=mxbai-embed-large
      - GENERIC_OPEN_AI_EMBEDDING_API_KEY=${LITELLM_MASTER_KEY}
      - EMBEDDING_MODEL_MAX_CHUNK_LENGTH=8192
      # 向量資料庫：PostgreSQL（pgvector）
      - VECTOR_DB=postgres
      - POSTGRES_DB_URL=postgresql://${ANYTHINGLLM_DB_USER}:${ANYTHINGLLM_DB_PASSWORD}@postgres:5432/anythingllm_db
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # 每次啟動都會透過 API 確保 LLM/Embedding/VectorDB 設定正確（冪等）
  anythingllm-init:
    profiles: [ "infra" ]
    image: curlimages/curl:latest
    container_name: anythingllm-init
    volumes:
      - ./anythingllm/ensure-settings.sh:/ensure-settings.sh:ro
    environment:
      ANYTHINGLLM_API_KEY: ${ANYTHINGLLM_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_BASE_URL: http://litellm_proxy:4000
      LLM_MODEL: llama3.1
      EMBEDDING_MODEL: mxbai-embed-large
      PGVECTOR_CONNECTION_STRING: postgresql://${ANYTHINGLLM_DB_USER}:${ANYTHINGLLM_DB_PASSWORD}@postgres:5432/anythingllm_db
    entrypoint: [ "sh", "/ensure-settings.sh" ]
    depends_on:
      anythingllm:
        condition: service_started
    restart: "no"

  # ── 應用層（profile: app）──────────────────────────────────
  backend-service:
    profiles: [ "app" ]
    build: ./backend
    container_name: backend-service
    environment:
      SPRING_PROFILES_ACTIVE: test
      DATASOURCE_URL: postgres
      DATASOURCE_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      ANYTHINGLLM_API_KEY: ${ANYTHINGLLM_API_KEY}
      ANYTHINGLLM_WORKSPACE_SLUG: ${ANYTHINGLLM_WORKSPACE_SLUG}
      ANYTHINGLLM_BASE_URL: http://anythingllm:3001
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/bot/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  nginx:
    profiles: [ "app" ]
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "9200:9200"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      backend-service:
        condition: service_healthy

volumes:
  postgres_data:
